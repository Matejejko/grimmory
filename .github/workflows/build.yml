# Goes in: .github/workflows/build.yml
#
# Builds the Grimmory image and pushes it to ghcr.io/<your-username>/grimmory.
# Triggers:
#   - push to main           -> tags: main, latest, sha-<short>
#   - push of tag vX.Y.Z     -> tags: X.Y.Z, X.Y, sha-<short>
#   - pull requests          -> build only (no push), proves the PR builds
#   - manual (workflow_dispatch)
#
# After the first successful run, the package will exist at
#   https://github.com/users/<your-username>/packages/container/grimmory
# It will be PRIVATE by default. Make it public (one-time):
#   Package -> Settings -> Change visibility -> Public

name: Build and Push Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase. github.repository_owner is already lowercase-comparable.
  IMAGE_NAME: ${{ github.repository_owner }}/grimmory

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Some build tools read git history (e.g. for version stamping).
          # Cheap insurance.
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On a tag push like v2.2.1 -> 2.2.1 and 2.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Always include the short SHA so every build is uniquely addressable
            type=sha,format=short
            # Branch name (only really matters for main now)
            type=ref,event=branch
            # 'latest' only when main is pushed (not for tags, not for PRs)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache makes second-and-later builds fast.
          # First build still has to compile everything from scratch (~15-25 min for Java+Angular).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image references
        if: github.event_name != 'pull_request'
        run: |
          echo "Pushed:"
          echo "${{ steps.meta.outputs.tags }}"
